<script>
// Toggle mobile menu
function toggleMenu() {
  document.getElementById('nav-links').classList.toggle('show');
}

// Dropdown toggle
document.addEventListener('click', function(e){
  if(e.target.matches('.toggle-dropdown')){
    e.preventDefault();
    let parentLi = e.target.closest('li');
    parentLi.classList.toggle('open');
  }
});

// Highlight active page
document.addEventListener('DOMContentLoaded', () => {
  const links = document.querySelectorAll('#nav-links li a');
  const currentPage = window.location.pathname.split("/").pop();
  links.forEach(link => {
    const linkPage = link.getAttribute('href');
    if(linkPage === currentPage){
      link.classList.add('active');
    }
  });
});
</script>

.mobile-nav-toggle { display: none; background: none; border: none; font-size: 24px; cursor: pointer; }
#nav-links li a.active { color: #ff6600; font-weight: bold; text-decoration: underline; }
